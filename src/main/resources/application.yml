spring:
  application:
    name: barber-dev-api

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# CORS — default: permite qualquer origem.
# Em produção, sobrescreva este valor no profile 'prod':
#   cors:
#     allowed-origins: "https://barberdev.com.br"
cors:
  allowed-origins: "*"
